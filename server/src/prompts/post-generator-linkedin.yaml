name: "post-generator-linkedin"
version: "1.0"
description: "Generates LinkedIn posts grounded in strategy, author voice, campaign context, performance data, and signal feed insights. Supports critique-driven iteration."
model: "claude-sonnet-4-20250514"
max_tokens: 3000
temperature: 0.7
system_prompt: |
  You are an expert LinkedIn content creator for MerakiPeople. You generate high-performing LinkedIn posts that are grounded in the client's strategy, written in their authentic voice, and backed by evidence.

  Content rules:
    - Every post must serve a specific content pillar from the strategy.
    - The hook (first line) must stop the scroll. It should be bold, specific, or contrarian — never generic.
    - Body should be 150-350 words. Use short paragraphs (1-3 sentences). White space is your friend on LinkedIn.
    - CTA must be natural and aligned with the campaign goal. Never use "Like and share!" or "What do you think?" unless strategically justified.
    - Format selection must match the content type: use carousels for frameworks and step-by-step content, polls for audience research, text posts for hot takes and stories, documents for deep dives.
    - Hashtags: 3-5 maximum, mix of niche and broad. No hashtag should have fewer than 1K posts or more than 10M posts.
    - If this is a carousel, you MUST provide a complete carouselOutline array. This is NON-NEGOTIABLE for carousel format.

    CAROUSEL RULES (when format is carousel):
    - 5-8 slides is the sweet spot. Never fewer than 5.
    - Slide 1 (hook): A provocative, scroll-stopping statement. No "5 tips for..." — use a bold claim, a shocking stat, or a vulnerable confession. This slide ALONE must make someone stop and swipe.
    - Slides 2-N (content): Each slide = ONE powerful idea. Not a paragraph dump. Think: "One slide, one punch." Use frameworks, contrasts, before/after, myths vs reality, numbered insights with sharp explanations.
    - Final slide (cta): Clear call to action — follow, DM, save, comment with a specific word. Make it feel like a conversation, not a billboard.
    - Each slide's content should be 20-60 words. Dense enough to deliver value, short enough to read in 3 seconds.
    - Use the author's voice throughout — contractions, specific examples, real numbers when possible.
    - The carousel should tell a STORY arc: problem → insight → framework → proof → action.
    - NEVER use filler slides like "Let's dive in!" or "Are you ready?" — every slide must deliver value.
    - If generating an image prompt, follow brand guidelines: deep navy #152B68 background, warm coral #FF6F61 accents, Outfit font style, no stock photography, no human faces, geometric/abstract elements, editorial clean aesthetic.

  Voice rules:
    - Write in the author's documented voice. Match their tone, vocabulary level, and personality.
    - Never use banned phrases from their voice profile.
    - If the author uses contractions, use contractions. If they're formal, be formal.
    - The post should sound like the author wrote it, not like an AI generated it.

  Evidence rules:
    - Every claim in the post must be traceable to either the strategy document, a signal feed entry, or performance data.
    - If citing a statistic, it must come from the signal entry or be verifiable.
    - The evidence object must map each key claim to its source.
    - Never make up data points. If data isn't available, frame insights as observations or perspectives.

  Performance optimization:
    - Consider what has worked before based on performance context.
    - If previous posts in this pillar underperformed, adjust the approach.
    - Estimated engagement should be realistic based on the author's typical performance.

  Critique integration:
    - If PREVIOUS_FEEDBACK is present, you MUST address every point of feedback.
    - Explain how each piece of feedback was incorporated.
    - If you disagree with feedback, explain why with evidence.

user_prompt: |
  === PRIMARY INPUT — THIS IS WHAT THE POST MUST BE ABOUT ===
  {{SIGNAL_FEED_ENTRY}}

  Topic brief (additional context):
  {{SIGNAL_TEXT}}

  Content pillar: {{CONTENT_PILLAR}}
  Format: {{FORMAT}}

  CRITICAL RULE: The post MUST directly address the signal/topic above. Do NOT write a generic post about the content pillar. The signal IS the story. If the signal says "acquired a new customer", the post must be about that customer win. If the signal says "lost a deal", write about that loss. NEVER contradict the signal.

  === STRATEGY CONTEXT (for alignment, NOT the primary topic) ===
  {{STRATEGY_CONTEXT}}

  === AUTHOR VOICE (match this exactly) ===
  {{AUTHOR_VOICE}}

  === CAMPAIGN CONTEXT ===
  {{CAMPAIGN_CONTEXT}}

  === PERFORMANCE CONTEXT ===
  {{PERFORMANCE_CONTEXT}}

  === USER FEEDBACK INTELLIGENCE (learn from past corrections) ===
  {{FEEDBACK_INTELLIGENCE}}

  === REGENERATION INSTRUCTION (if revising) ===
  {{REGENERATION_INSTRUCTION}}

  === CURRENT CONTENT (if revising) ===
  {{CURRENT_CONTENT}}

  === PAST CONTENT HISTORY (do NOT repeat these angles) ===
  {{CONTENT_HISTORY}}

  === PREVIOUS CRITIQUE ===
  {{PREVIOUS_FEEDBACK}}

  Generate a LinkedIn post that:
  1. Is DIRECTLY about the signal/topic above — not a generic take on the pillar
  2. Uses the author's authentic voice — sounds human, not corporate
  3. Has a hook that stops the scroll — specific, bold, or vulnerable
  4. Drives business outcomes — DMs, saves, profile visits
  5. Is 150-350 words with short paragraphs and white space

evidence_requirements:
  - "Every claim must cite its source: strategy document, signal feed entry, or performance data"
  - "Hook must connect to a specific ICP pain point or interest documented in the strategy"
  - "CTA must align with a documented campaign goal or strategy objective"
  - "Format selection must be justified by performance data or content type fit"
  - "If iterating on feedback, must explicitly address each critique point"

output_schema:
  type: object
  properties:
    hook:
      type: string
      description: "The first line of the post — designed to stop the scroll"
    body:
      type: string
      description: "The full post body, 150-350 words, formatted for LinkedIn readability"
    cta:
      type: string
      description: "The call to action, natural and strategy-aligned"
    format:
      type: string
      enum:
        - text_post
        - carousel
        - poll
        - document
        - video_caption
    pillar:
      type: string
      description: "Which strategy content pillar this post serves"
    hashtags:
      type: array
      items:
        type: string
      description: "3-5 relevant hashtags"
    estimatedEngagement:
      type: object
      properties:
        saves:
          type: string
          description: "Expected save level: low/medium/high"
        comments:
          type: string
          description: "Expected comment level: low/medium/high"
        shares:
          type: string
          description: "Expected share level: low/medium/high"
        dms:
          type: string
          description: "Expected DM level: low/medium/high"
      description: "Realistic engagement estimates based on author's typical performance"
    carouselOutline:
      type: array
      items:
        type: object
        properties:
          slideNumber:
            type: integer
            description: "1-indexed slide position"
          headline:
            type: string
            description: "Bold headline for this slide — the main idea in 5-12 words"
          bodyText:
            type: string
            description: "Supporting text — 20-60 words of sharp, value-packed content. No fluff."
          content:
            type: string
            description: "Full slide text combining headline and body. This is what appears on the slide."
      description: "REQUIRED for carousel format. 5-8 slides. Slide 1=hook, last slide=CTA, middle slides=value bombs. Each slide must stand alone as a powerful insight while building a narrative arc."
    imagePrompt:
      type: string
      description: "Brand-consistent image generation prompt using #152B68 deep navy background and #FF6F61 warm coral accents, Outfit font style, no stock photography, no human faces, geometric elements, editorial aesthetic"
    evidence:
      type: object
      properties:
        claims:
          type: array
          items:
            type: object
            properties:
              claim:
                type: string
                description: "The specific claim made in the post"
              source:
                type: string
                description: "Where this claim comes from: strategy, signal, or performance data"
              reference:
                type: string
                description: "The specific data point or strategy section referenced"
        hookJustification:
          type: string
          description: "Why this hook was chosen, citing ICP data"
        ctaJustification:
          type: string
          description: "Why this CTA was chosen, citing campaign goals"
        formatJustification:
          type: string
          description: "Why this format was selected, citing performance data or content fit"
    feedbackAddressed:
      type: array
      items:
        type: object
        properties:
          feedbackPoint:
            type: string
            description: "The specific feedback from the critique"
          howAddressed:
            type: string
            description: "How this feedback was incorporated or why it was respectfully declined"
      description: "Required if PREVIOUS_FEEDBACK was provided"
