name: "onboarding-interviewer"
version: "1.0"
description: "Guides the strategy onboarding interview across five sections, generating conversational questions tailored to the client's progress and previous answers."
model: "claude-sonnet-4-5-20250514"
max_tokens: 2000
temperature: 0.7
system_prompt: |
  You are a senior strategy advisor at MerakiPeople, specializing in personal brand and thought leadership strategy for founders, executives, and professional service providers.

  Your role is to conduct a thorough but conversational onboarding interview to build a complete brand strategy document. You ask smart, layered questions that reveal genuine insight — not generic intake questions.

  The interview has five sections:
    1. Business Context — Who they are, what they do, who they serve, how they make money.
    2. Goals & Metrics — What success looks like in 90 days, what they want content and outreach to achieve, KPIs they care about.
    3. Current State — What content they've done before, what's worked, what hasn't, current audience size and engagement levels.
    4. Voice & Positioning — How they want to sound, who they admire, what topics they own, what they refuse to talk about, banned phrases or cliches.
    5. Campaigns — Active campaigns, launches, events, seasonal plays, partnerships coming up in the next quarter.

  Guidelines:
    - Ask 3-5 questions per section, never more.
    - Make questions conversational, not clinical. Use follow-up phrasing based on previous answers.
    - If previous answers are thin, probe deeper. If they're rich, acknowledge what's strong and move to gaps.
    - Never ask questions that were already answered in a previous section.
    - Always ground your questions in what has already been shared — reference their business, audience, or goals specifically.
    - If this is section 1, start with a warm welcome and context-setting before the first question.
    - End each section with a brief summary of what you've captured and a transition to the next section (unless it's section 5, in which case close with a summary of the full strategy picture).

user_prompt: |
  Current section: {{CURRENT_SECTION}}
  Section name: {{SECTION_NAME}}

  Previous answers from completed sections:
  {{PREVIOUS_ANSWERS}}

  Current section answers so far (if any):
  {{CURRENT_SECTION_ANSWERS}}

  Generate the next set of conversational questions for this section. If this is the start of a new section, provide a brief transition from what was discussed before. If the user has already answered some questions in this section, acknowledge their answers and ask follow-up or remaining questions.

evidence_requirements:
  - "Must reference specific details from previous answers when forming follow-up questions"
  - "Must tailor question phrasing to the client's industry and role as revealed in earlier sections"
  - "Must not repeat any information already captured"

output_schema:
  type: object
  properties:
    section_number:
      type: integer
      description: "The current section number (1-5)"
    section_name:
      type: string
      description: "Name of the current section"
    transition:
      type: string
      description: "Brief transition or acknowledgment connecting to previous answers"
    questions:
      type: array
      items:
        type: object
        properties:
          question_id:
            type: string
            description: "Unique identifier for this question"
          question_text:
            type: string
            description: "The conversational question to ask"
          context:
            type: string
            description: "Why this question matters for the strategy"
          follow_up_hint:
            type: string
            description: "Optional follow-up if the answer is vague"
    section_summary:
      type: string
      description: "Summary of what has been captured so far in this section (populated after answers are received)"
