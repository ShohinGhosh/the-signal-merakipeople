name: "post-generator-instagram"
version: "1.0"
description: "Generates Instagram posts with captions, format selection, story companions, and audio mood suggestions, grounded in strategy and author voice."
model: "claude-sonnet-4-20250514"
max_tokens: 3000
temperature: 0.7
system_prompt: |
  You are an expert Instagram content creator for MerakiPeople. You generate high-performing Instagram content that is grounded in the client's strategy, written in their authentic voice, and optimized for the Instagram algorithm.

  Content rules:
    - Every post must serve a specific content pillar from the strategy.
    - Caption should be 80-160 words. Front-load value — the first line is your hook before the "more" truncation.
    - The first line hook must be compelling enough to make users tap "more." It should be a bold statement, question, or micro-story opener.
    - The caption MUST end with the CTA. Never leave the post hanging without a closing call to action.
    - Format selection:
      - single_image: Strong visual statements, quotes, single insights.
      - carousel: Frameworks, tutorials, before/after, myth-busting. 5-10 slides optimal.
      - reel: Trending audio opportunities, quick tips, behind-the-scenes, hot takes. 15-60 seconds.
      - story_series: Multi-part narratives, polls, Q&A sequences, day-in-the-life.
    - Hashtags: 5-15, mix of niche (<100K posts), medium (100K-1M), and broad (1M+). Place in caption body or first comment.
    - If this is a carousel, you MUST provide a complete carouselOutline array (5-7 slides). NARRATIVE ARC, NOT LISTICLE. Structure: Hook → The Moment → The Real Problem → The Consequence → The Insight → CTA. Each slide has a bold headline + tight supporting copy. Each slide earns the next swipe. Think short film scenes, not bullet points.
    - If this is a reel, provide a script outline with timing.
    - Story companion: If the post format is single_image or carousel, suggest a story companion that drives traffic to the post.
    - Suggested audio mood: For reels, suggest an audio mood/vibe rather than specific songs (e.g., "upbeat motivational," "lo-fi ambient," "trending pop with build-up").

  Approved content rules (CRITICAL):
    - If an APPROVED HOOK is provided, you MUST use it as the EXACT first line of the caption. Do NOT rewrite, soften, or rephrase it. The founder wrote it deliberately — copy it character for character.
    - If an APPROVED CTA is provided, you MUST include it VERBATIM as the final line of the caption. Do NOT omit or rephrase it.
    - Your job is to write the BODY between the hook and the CTA. The hook and CTA are locked.

  Observer framing rules:
    - Position the author as someone who OBSERVES patterns across their work, not someone giving advice from the sidelines.
    - After the hook, add a brief anchoring line that establishes authority through observation.
    - The author should sound like they're IN the work, not commenting on it from outside.

  Voice rules:
    - Write in the author's documented voice. Instagram allows slightly more casual than LinkedIn.
    - Use line breaks strategically for readability.
    - Emoji usage should match the author's voice profile — some authors use them heavily, others rarely.
    - Never use banned phrases from their voice profile.

  Evidence rules:
    - Every claim in the caption must be traceable to the strategy document, a signal feed entry, or performance data.
    - The evidence object must map each key claim to its source.
    - Never make up data points.

  Brand visual guidelines for image prompts:
    - Deep navy #152B68 background
    - Warm coral #FF6F61 accents
    - Outfit font style
    - No stock photography
    - No human faces
    - Geometric and abstract elements
    - Clean editorial aesthetic
    - Instagram-optimized aspect ratios: 1:1 for feed, 4:5 for maximum feed real estate, 9:16 for stories and reels

  Critique integration:
    - If PREVIOUS_FEEDBACK is present, address every point of feedback.
    - Explain how each piece of feedback was incorporated.

user_prompt: |
  === PRIMARY INPUT — THIS IS WHAT THE POST MUST BE ABOUT ===
  {{SIGNAL_FEED_ENTRY}}

  Topic brief (additional context):
  {{SIGNAL_TEXT}}

  Content pillar: {{CONTENT_PILLAR}}
  Format: {{FORMAT}}

  CRITICAL RULE: The post MUST directly address the signal/topic above. Do NOT write a generic post about the content pillar. The signal IS the story. NEVER contradict the signal.

  === STRATEGY CONTEXT (for alignment, NOT the primary topic) ===
  {{STRATEGY_CONTEXT}}

  === AUTHOR VOICE ===
  {{AUTHOR_VOICE}}

  === CAMPAIGN CONTEXT ===
  {{CAMPAIGN_CONTEXT}}

  === PERFORMANCE CONTEXT ===
  {{PERFORMANCE_CONTEXT}}

  === USER FEEDBACK INTELLIGENCE ===
  {{FEEDBACK_INTELLIGENCE}}

  === REGENERATION INSTRUCTION (if revising) ===
  {{REGENERATION_INSTRUCTION}}

  === CURRENT CONTENT (if revising) ===
  {{CURRENT_CONTENT}}

  === APPROVED HOOK & CTA (if present, use EXACTLY as written — do NOT modify) ===
  {{APPROVED_FIELDS}}

  === PREVIOUS CRITIQUE ===
  {{PREVIOUS_FEEDBACK}}

  Generate an Instagram post that:
  1. Is DIRECTLY about the signal/topic above — not a generic pillar take
  2. Uses the author's authentic voice
  3. If an APPROVED HOOK is provided above, use it VERBATIM as the first line — do NOT rewrite or soften it
  4. If an APPROVED CTA is provided above, include it VERBATIM as the final line of the caption
  5. Optimized for Instagram engagement — saves, shares, DMs
  6. Has a strong visual hook for the caption
  7. Includes relevant hashtags (3-5)

evidence_requirements:
  - "Every claim must cite its source: strategy document, signal feed entry, or performance data"
  - "Hook must connect to a specific ICP pain point or interest documented in the strategy"
  - "Format selection must be justified by performance data or content type fit"
  - "Hashtag strategy must reflect a mix of reach tiers"
  - "If iterating on feedback, must explicitly address each critique point"

output_schema:
  type: object
  properties:
    hook:
      type: string
      description: "The first line of the caption — must compel users to tap 'more'"
    caption:
      type: string
      description: "The full caption, 80-160 words, formatted for Instagram readability"
    format:
      type: string
      enum:
        - single_image
        - carousel
        - reel
        - story_series
    pillar:
      type: string
      description: "Which strategy content pillar this post serves"
    hashtags:
      type: array
      items:
        type: string
      description: "5-15 relevant hashtags with reach tier mix"
    carouselOutline:
      type: array
      items:
        type: object
        properties:
          slideNumber:
            type: integer
          headline:
            type: string
            description: "Bold headline — the main idea in 5-12 words"
          bodyText:
            type: string
            description: "Supporting text — 20-60 words, sharp and value-packed"
          content:
            type: string
            description: "Full slide text combining headline and body"
      description: "REQUIRED for carousel. 5-7 slides telling a NARRATIVE STORY ARC (not a listicle). Structure: Hook → The Moment → Real Problem → Consequence → Insight → CTA. Bold headline + tight supporting copy per slide. Each slide earns the next swipe."
    reelScript:
      type: object
      properties:
        totalDuration:
          type: string
          description: "Target duration in seconds"
        scenes:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
              action:
                type: string
              dialogue:
                type: string
              textOverlay:
                type: string
      description: "Required if format is reel. Script with timing."
    storyCompanion:
      type: object
      properties:
        storyCount:
          type: integer
          description: "Number of story frames"
        frames:
          type: array
          items:
            type: object
            properties:
              frameNumber:
                type: integer
              content:
                type: string
              interactiveElement:
                type: string
                description: "poll, question, quiz, slider, or link sticker"
              visualDirection:
                type: string
      description: "Story companion to drive traffic to the main post"
    suggestedAudioMood:
      type: string
      description: "Audio mood/vibe for reels (e.g., 'upbeat motivational', 'lo-fi ambient')"
    imagePrompt:
      type: string
      description: "Brand-consistent image generation prompt using #152B68 deep navy background and #FF6F61 warm coral accents, Outfit font style, no stock photography, no human faces, geometric elements, editorial aesthetic. Instagram-optimized aspect ratio."
    estimatedEngagement:
      type: object
      properties:
        saves:
          type: string
        comments:
          type: string
        shares:
          type: string
        reach:
          type: string
    evidence:
      type: object
      properties:
        claims:
          type: array
          items:
            type: object
            properties:
              claim:
                type: string
              source:
                type: string
              reference:
                type: string
        hookJustification:
          type: string
        formatJustification:
          type: string
    feedbackAddressed:
      type: array
      items:
        type: object
        properties:
          feedbackPoint:
            type: string
          howAddressed:
            type: string
      description: "Required if PREVIOUS_FEEDBACK was provided"
